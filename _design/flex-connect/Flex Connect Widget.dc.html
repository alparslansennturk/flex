<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #EEF0F3; color: #1B1F26; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #D4D7DD; border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
  input, textarea { font-family: inherit; }
  input::placeholder, textarea::placeholder { color: #A2A8B2; }
  textarea { resize: none; }
  @keyframes fcType { 0%,60%,100% { transform: translateY(0); opacity:.5; } 30% { transform: translateY(-3px); opacity:1; } }
</style>
</helmet>

<div data-screen-label="Flex Connect Widget" style="position:relative;width:100%;height:100vh;min-height:600px;overflow:hidden;">

  <!-- ambient dashboard hint so the widget reads in context -->
  <div style="position:absolute;inset:0;background:#EEF0F3;display:flex;align-items:center;justify-content:center;">
    <div style="text-align:center;color:#B7BDC7;">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto;"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
      <div style="font-size:13px;font-weight:600;margin-top:10px;">Dashboard · Flex Connect widget'ı sağ altta</div>
    </div>
  </div>

  <!-- ================= MINI CHAT WINDOW ================= -->
  <div style="{{ panelStyle }}">
    <sc-if value="{{ open }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;flex-direction:column;height:100%;">

        <!-- header -->
        <div style="flex:0 0 auto;padding:14px 16px;background:#12233B;display:flex;align-items:center;gap:11px;">
          <div style="width:34px;height:34px;border-radius:10px;background:#2867bd;display:flex;align-items:center;justify-content:center;flex:0 0 auto;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/></svg>
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:14.5px;font-weight:800;color:#fff;letter-spacing:-.2px;">Flex Connect</div>
            <div style="font-size:11px;font-weight:600;color:#8FA3BE;display:flex;align-items:center;gap:5px;"><span style="width:6px;height:6px;border-radius:50%;background:#2ECC71;"></span>Çevrimiçi</div>
          </div>
          <a href="Flex Connect.dc.html" title="Tam ekran aç" style="width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#8FA3BE;cursor:pointer;transition:all .13s;" style-hover="background:rgba(255,255,255,.08);color:#fff;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
          </a>
          <button onClick="{{ toggle }}" title="Simge durumuna küçült" style="width:32px;height:32px;border-radius:9px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;color:#8FA3BE;cursor:pointer;transition:all .13s;" style-hover="background:rgba(255,255,255,.08);color:#fff;">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
        </div>

        <!-- LIST view -->
        <sc-if value="{{ showList }}" hint-placeholder-val="{{ true }}">
          <div style="flex:1;display:flex;flex-direction:column;min-height:0;background:#fff;">
            <div style="flex:0 0 auto;padding:12px 14px 8px;">
              <div style="position:relative;">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#A2A8B2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input value="{{ query }}" onInput="{{ onQuery }}" placeholder="Ara…" style="width:100%;height:38px;padding:0 12px 0 35px;border-radius:10px;border:1px solid #E9EBEF;background:#F4F5F7;color:#1B1F26;font-size:13.5px;font-weight:500;outline:none;" style-focus="background:#fff;border-color:#B7CCEC;" />
              </div>
            </div>
            <div style="flex:1;overflow-y:auto;padding:0 8px 10px;">
              <sc-for list="{{ rows }}" as="r" hint-placeholder-count="6">
                <div onClick="{{ r.onClick }}" style="display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:11px;cursor:pointer;transition:background .12s;" style-hover="background:#F4F5F7;">
                  <div style="{{ r.iconWrap }}">{{ r.iconEl }}</div>
                  <div style="flex:1;min-width:0;">
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;">
                      <span style="font-size:13.5px;font-weight:700;color:#1B1F26;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ r.name }}</span>
                      <span style="font-size:10.5px;font-weight:600;color:{{ r.timeColor }};flex:0 0 auto;">{{ r.time }}</span>
                    </div>
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:2px;">
                      <span style="font-size:12px;color:#8A909B;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ r.preview }}</span>
                      <sc-if value="{{ r.hasUnread }}" hint-placeholder-val="{{ false }}"><span style="min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#2867bd;color:#fff;font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 auto;">{{ r.unread }}</span></sc-if>
                    </div>
                  </div>
                </div>
              </sc-for>
            </div>
          </div>
        </sc-if>

        <!-- CONVERSATION view -->
        <sc-if value="{{ showChat }}" hint-placeholder-val="{{ false }}">
          <div style="flex:1;display:flex;flex-direction:column;min-height:0;background:#F7F8FA;">
            <div style="flex:0 0 auto;padding:10px 12px;background:#fff;border-bottom:1px solid #E9EBEF;display:flex;align-items:center;gap:10px;">
              <button onClick="{{ back }}" title="Geri" style="width:30px;height:30px;border-radius:9px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;color:#5A616C;cursor:pointer;transition:all .13s;flex:0 0 auto;" style-hover="background:#F4F5F7;color:#1B1F26;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
              </button>
              <div style="{{ chatIconWrap }}">{{ chatIconEl }}</div>
              <div style="min-width:0;">
                <div style="font-size:13.5px;font-weight:800;color:#1B1F26;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ chatName }}</div>
                <div style="font-size:11px;color:#8A909B;font-weight:500;">{{ chatMeta }}</div>
              </div>
            </div>
            <div style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;">
              <sc-for list="{{ messages }}" as="m" hint-placeholder-count="4">
                <div style="{{ m.rowStyle }}">
                  <div style="{{ m.bubbleWrap }}">
                    <sc-if value="{{ m.showName }}" hint-placeholder-val="{{ false }}"><span style="font-size:11px;font-weight:700;color:{{ m.nameColor }};margin:0 0 3px 2px;">{{ m.sender }}</span></sc-if>
                    <div style="{{ m.bubbleStyle }}">
                      <span style="font-size:13px;line-height:1.45;color:#26303D;">{{ m.text }}</span>
                      <span style="{{ m.metaStyle }}">{{ m.time }}</span>
                    </div>
                  </div>
                </div>
              </sc-for>
              <div style="align-self:flex-start;display:inline-flex;align-items:center;gap:8px;padding:6px 11px;border-radius:999px;background:#fff;border:1px solid #ECEEF1;">
                <span style="display:inline-flex;gap:3px;">
                  <span style="width:5px;height:5px;border-radius:50%;background:#B4BAC4;animation:fcType 1.2s infinite;"></span>
                  <span style="width:5px;height:5px;border-radius:50%;background:#B4BAC4;animation:fcType 1.2s infinite .2s;"></span>
                  <span style="width:5px;height:5px;border-radius:50%;background:#B4BAC4;animation:fcType 1.2s infinite .4s;"></span>
                </span>
                <span style="font-size:11.5px;font-weight:600;color:#8A909B;">Elif yazıyor…</span>
              </div>
            </div>
            <div style="flex:0 0 auto;padding:10px 12px 12px;">
              <div style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E4E6EB;border-radius:13px;padding:5px 5px 5px 8px;">
                <button title="Dosya ekle" style="width:32px;height:32px;border-radius:9px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;color:#6B717C;cursor:pointer;flex:0 0 auto;transition:all .13s;" style-hover="background:#F4F5F7;color:#2867bd;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
                <textarea value="{{ draft }}" onInput="{{ onDraft }}" onKeyDown="{{ onKey }}" rows="1" placeholder="Mesaj yazın…" style="flex:1;border:none;background:transparent;outline:none;font-size:13.5px;line-height:1.4;color:#1B1F26;padding:7px 2px;max-height:80px;min-height:20px;"></textarea>
                <button onClick="{{ onSend }}" title="Gönder" style="{{ sendBtnStyle }}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"/><path d="m21.854 2.147-10.94 10.939"/></svg></button>
              </div>
            </div>
          </div>
        </sc-if>

      </div>
    </sc-if>
  </div>

  <!-- ================= FLOATING LAUNCHER (FAB) ================= -->
  <button onClick="{{ toggle }}" title="Flex Connect" style="{{ fabStyle }}">
    <sc-if value="{{ open }}" hint-placeholder-val="{{ true }}">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </sc-if>
    <sc-if value="{{ closed }}" hint-placeholder-val="{{ false }}">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/></svg>
    </sc-if>
    <sc-if value="{{ showFabBadge }}" hint-placeholder-val="{{ true }}"><span style="position:absolute;top:-2px;right:-2px;min-width:22px;height:22px;padding:0 6px;border-radius:999px;background:#E5484D;color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 3px #EEF0F3;">{{ totalUnread }}</span></sc-if>
  </button>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}">
class Component extends DCLogic {
  ICONS = {
    channel: '<path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>',
    group: '<path d="M18 21a8 8 0 0 0-16 0"/><circle cx="10" cy="8" r="5"/><path d="M22 20c0-3.37-2-6.5-4-8a5 5 0 0 0-.45-8.3"/>',
  };
  CHATS = [
    { id:'duyuru', icon:'channel', name:'Kurum Duyuruları', preview:'Sertifika töreni 20 Temmuz…', time:'14:32', unread:3, meta:'428 üye · Kanal' },
    { id:'ogrisleri', icon:'channel', name:'Öğrenci İşleri', preview:'Ödev teslim tarihi uzatıldı.', time:'13:05', unread:1, meta:'212 üye · Kanal' },
    { id:'grafik', icon:'group', name:'Grafik Tasarım A', preview:'Burak: Çalışmama başladım.', time:'11:20', unread:2, meta:'24 üye · Grup' },
    { id:'genel', icon:'channel', name:'Genel Duyurular', preview:'Yarın laboratuvar B-201.', time:'Dün', unread:0, meta:'640 üye · Kanal' },
  ];
  THREADS = {
    duyuru: [
      { sender:'Elif Kaya', color:'#B45309', text:'Yarın laboratuvar B-201 olarak değişmiştir.', time:'09:13', mine:false },
      { sender:'Naz Erdem', color:'#6C5CE7', text:'Sertifikalar hazırdır, teslim alınabilir.', time:'14:20', mine:false },
      { sender:'Ben', color:'#2867bd', text:'Teşekkürler, eğitmenlerle paylaşacağım.', time:'14:32', mine:true },
    ],
  };
  state = { open:true, sel:null, query:'', draft:'' };

  svgEl(html, sz){ return React.createElement('span',{ style:{display:'flex'}, dangerouslySetInnerHTML:{__html:'<svg width="'+(sz||18)+'" height="'+(sz||18)+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+html+'</svg>'} }); }

  renderVals(){
    const s=this.state;
    const q=s.query.trim().toLocaleLowerCase('tr');
    let list=this.CHATS;
    if (q) list=list.filter(c=>c.name.toLocaleLowerCase('tr').includes(q));
    const rows=list.map(c=>({
      onClick:()=>this.setState({sel:c.id}),
      iconWrap:{ width:'42px', height:'42px', borderRadius:'12px', flex:'0 0 auto', display:'flex', alignItems:'center', justifyContent:'center', background:c.unread?'#EAF1FB':'#EEF1F5', color:c.unread?'#2867bd':'#5A616C' },
      iconEl:this.svgEl(this.ICONS[c.icon],19),
      name:c.name, time:c.time, timeColor:c.unread?'#2867bd':'#A2A8B2', preview:c.preview,
      hasUnread:c.unread>0, unread:String(c.unread),
    }));
    const totalUnread=this.CHATS.reduce((a,c)=>a+c.unread,0);

    const cur=this.CHATS.find(c=>c.id===s.sel);
    const thread=(cur&&this.THREADS[cur.id])||this.THREADS.duyuru;
    const messages=(cur?thread:[]).map(t=>({
      rowStyle:{ display:'flex', justifyContent:t.mine?'flex-end':'flex-start' },
      bubbleWrap:{ maxWidth:'82%', display:'flex', flexDirection:'column', alignItems:t.mine?'flex-end':'flex-start' },
      showName:!t.mine, sender:t.sender, nameColor:t.color,
      bubbleStyle:{ background:t.mine?'#EDF1FC':'#fff', border:'1px solid '+(t.mine?'#DCE3F6':'#ECEEF1'), borderRadius:t.mine?'14px 14px 4px 14px':'14px 14px 14px 4px', padding:'7px 11px 6px' },
      text:t.text, time:t.time,
      metaStyle:{ display:'block', textAlign:'right', fontSize:'10px', fontWeight:600, color:t.mine?'#8AA6D8':'#A2A8B2', marginTop:'2px' },
    }));
    const canSend=s.draft.trim().length>0;

    return {
      open:s.open, closed:!s.open, toggle:()=>this.setState({open:!s.open}),
      showFabBadge: totalUnread>0 && !s.open, totalUnread:String(totalUnread),
      fabStyle:{ position:'absolute', right:'28px', bottom:'28px', width:'58px', height:'58px', borderRadius:'50%', border:'none', background:'#2867bd', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', boxShadow:'0 10px 26px -8px rgba(40,103,189,.6)', transition:'transform .16s ease, background .16s', zIndex:20 },
      panelStyle:{ position:'absolute', right:'28px', bottom:'100px', width:'380px', height:'560px', maxHeight:'calc(100vh - 130px)', background:'#fff', borderRadius:'18px', overflow:'hidden', boxShadow:'0 24px 60px -16px rgba(18,35,59,.4)', border:'1px solid #E4E6EB', transformOrigin:'bottom right', transform:s.open?'translateY(0) scale(1)':'translateY(16px) scale(.92)', opacity:s.open?1:0, visibility:s.open?'visible':'hidden', transition:'transform .26s cubic-bezier(.2,.8,.3,1), opacity .2s ease, visibility .2s', zIndex:15 },
      showList:!s.sel, showChat:!!s.sel,
      query:s.query, onQuery:e=>this.setState({query:e.target.value}), rows,
      back:()=>this.setState({sel:null}),
      chatIconWrap:{ width:'32px', height:'32px', borderRadius:'10px', flex:'0 0 auto', display:'flex', alignItems:'center', justifyContent:'center', background:'#EAF1FB', color:'#2867bd' },
      chatIconEl:this.svgEl(cur?this.ICONS[cur.icon]:this.ICONS.channel,17),
      chatName:cur?cur.name:'', chatMeta:cur?cur.meta:'', messages,
      draft:s.draft, onDraft:e=>this.setState({draft:e.target.value}),
      onKey:e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); this.send(); } },
      onSend:()=>this.send(),
      sendBtnStyle:{ width:'34px', height:'34px', borderRadius:'10px', border:'none', display:'flex', alignItems:'center', justifyContent:'center', cursor:canSend?'pointer':'default', color:'#fff', background:canSend?'#2867bd':'#C3CAD4', flex:'0 0 auto', transition:'background .15s' },
    };
  }
  send(){ if(this.state.draft.trim()) this.setState({ draft:'' }); }
}
</script>
</body>
</html>
