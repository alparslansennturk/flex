name: Monthly Winner

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monthly-winner
        run: |
          curl -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://flex-one-iota.vercel.app/api/cron/monthly-winner
